<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Gabriel Bensamoun — Full-Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F1F1F"/>
      <stop offset="55%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#B35A38"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B35A38" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E08A63" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B35A38" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FD1C5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4FD1C5" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4FD1C5" stop-opacity="0"/>
    </linearGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#F5F5F5" fill-opacity="0.05"/>
    </pattern>
    <clipPath id="card"><rect x="0" y="0" width="900" height="300" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#card)">

    <!-- ============ BOOT TERMINAL ============ -->
    <g id="boot">
      <rect width="900" height="300" fill="#0A0C10"/>

      <!-- title bar -->
      <rect width="900" height="30" fill="#12161C"/>
      <circle cx="22" cy="15" r="5" fill="#FF5F57"/>
      <circle cx="40" cy="15" r="5" fill="#FEBC2E"/>
      <circle cx="58" cy="15" r="5" fill="#28C840"/>
      <text x="450" y="20" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
            font-size="12" fill="#F5F5F5" fill-opacity="0.4">gabbensa — secure shell</text>

      <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13.5">
        <text x="24" y="60" fill="#4FD1C5" opacity="0">$ ssh gabbensa@dev.local
          <set attributeName="opacity" to="1" begin="0.2s" fill="freeze"/>
        </text>
        <text x="24" y="82" fill="#8B949E" opacity="0">  establishing secure channel<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="0.7s" fill="freeze"/>
        </text>
        <text x="24" y="104" fill="#8B949E" opacity="0">  key exchange · ed25519<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="1.1s" fill="freeze"/>
        </text>
        <text x="24" y="126" fill="#8B949E" opacity="0">  loading stack modules · react next node postgres<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="1.5s" fill="freeze"/>
        </text>
        <text x="24" y="148" fill="#8B949E" opacity="0">  mounting /projects<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="1.9s" fill="freeze"/>
        </text>
        <text x="24" y="170" fill="#8B949E" opacity="0">  enforcing row-level security<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="2.3s" fill="freeze"/>
        </text>
        <text x="24" y="192" fill="#8B949E" opacity="0">  verifying identity<tspan fill="#4FD1C5">  [ ok ]</tspan>
          <set attributeName="opacity" to="1" begin="2.7s" fill="freeze"/>
        </text>
        <text x="24" y="214" fill="#8B949E" opacity="0">  decrypting profile
          <set attributeName="opacity" to="1" begin="3.1s" fill="freeze"/>
        </text>

        <!-- progress bar -->
        <g opacity="0">
          <set attributeName="opacity" to="1" begin="3.1s" fill="freeze"/>
          <rect x="24" y="228" width="300" height="6" rx="3" fill="#F5F5F5" fill-opacity="0.1"/>
          <rect x="24" y="228" width="0" height="6" rx="3" fill="#4FD1C5">
            <animate attributeName="width" values="0;300" begin="3.1s" dur="1.1s" fill="freeze"/>
          </rect>
        </g>

        <!-- blinking cursor -->
        <rect x="24" y="248" width="8" height="15" fill="#4FD1C5">
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" repeatCount="5"/>
          <set attributeName="opacity" to="0" begin="4.2s" fill="freeze"/>
        </rect>
      </g>

      <!-- ACCESS GRANTED -->
      <g opacity="0">
        <set attributeName="opacity" to="1" begin="4.3s" fill="freeze"/>
        <rect x="24" y="244" width="230" height="34" rx="4" fill="#4FD1C5" fill-opacity="0.12" stroke="#4FD1C5" stroke-opacity="0.6"/>
        <text x="139" y="267" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
              font-size="16" font-weight="700" fill="#4FD1C5" letter-spacing="2">ACCESS GRANTED
          <animate attributeName="opacity" values="1;0.2;1;0.3;1" begin="4.3s" dur="0.5s" fill="freeze"/>
        </text>
      </g>

      <rect width="900" height="300" fill="url(#scan)"/>

      <!-- boot fades out -->
      <animate attributeName="opacity" values="1;0" begin="5.1s" dur="0.5s" fill="freeze"/>
    </g>

    <!-- ============ PROFILE HEADER ============ -->
    <g id="profile" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="5.3s" dur="0.6s" fill="freeze"/>

      <rect width="900" height="300" fill="url(#bg)"/>

      <g stroke="#F5F5F5" stroke-opacity="0.045">
        <path d="M0 50H900M0 100H900M0 150H900M0 200H900M0 250H900"/>
        <path d="M75 0V300M150 0V300M225 0V300M300 0V300M375 0V300M450 0V300M525 0V300M600 0V300M675 0V300M750 0V300M825 0V300"/>
      </g>

      <path d="M0 232 C 150 202, 300 262, 450 232 S 750 202, 900 232 L900 300 L0 300 Z" fill="#2C2C2C" fill-opacity="0.55">
        <animate attributeName="d"
          values="M0 232 C 150 202, 300 262, 450 232 S 750 202, 900 232 L900 300 L0 300 Z;
                  M0 232 C 150 262, 300 202, 450 232 S 750 262, 900 232 L900 300 L0 300 Z;
                  M0 232 C 150 202, 300 262, 450 232 S 750 202, 900 232 L900 300 L0 300 Z"
          dur="9s" repeatCount="indefinite"/>
      </path>
      <path d="M0 254 C 180 228, 320 280, 500 254 S 760 228, 900 254 L900 300 L0 300 Z" fill="#1F1F1F" fill-opacity="0.75">
        <animate attributeName="d"
          values="M0 254 C 180 228, 320 280, 500 254 S 760 228, 900 254 L900 300 L0 300 Z;
                  M0 254 C 180 280, 320 228, 500 254 S 760 280, 900 254 L900 300 L0 300 Z;
                  M0 254 C 180 228, 320 280, 500 254 S 760 228, 900 254 L900 300 L0 300 Z"
          dur="7s" repeatCount="indefinite"/>
      </path>

      <rect x="0" y="0" width="900" height="2" fill="url(#glow)">
        <animate attributeName="x" values="-900;900" dur="6s" repeatCount="indefinite"/>
      </rect>

      <!-- terminal prompt -->
      <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
        <text x="26" y="52" fill="#4FD1C5" fill-opacity="0.75">~/gabbensa</text>
        <text x="104" y="52" fill="#F5F5F5" fill-opacity="0.45">$ whoami</text>
        <rect x="176" y="42" width="7" height="13" fill="#4FD1C5" fill-opacity="0.8">
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.6s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- corner brackets -->
      <g stroke="#4FD1C5" stroke-opacity="0.5" stroke-width="2" fill="none">
        <path d="M14 58 V34 H38"/>
        <path d="M886 58 V34 H862"/>
        <path d="M14 260 V284 H38"/>
        <path d="M886 260 V284 H862"/>
      </g>

      <g font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif" text-anchor="middle">
        <!-- glitch layers -->
        <text x="447" y="128" font-size="50" font-weight="700" fill="#4FD1C5" letter-spacing="0.5" opacity="0">
          Gabriel Bensamoun
          <animate attributeName="opacity" values="0;0;0.7;0;0.5;0;0;0;0;0.6;0;0"
                   keyTimes="0;0.44;0.452;0.464;0.476;0.488;0.5;0.86;0.87;0.882;0.894;1"
                   dur="16s" begin="5.9s" repeatCount="indefinite"/>
        </text>
        <text x="453" y="128" font-size="50" font-weight="700" fill="#E08A63" letter-spacing="0.5" opacity="0">
          Gabriel Bensamoun
          <animate attributeName="opacity" values="0;0;0.7;0;0.5;0;0;0;0;0.6;0;0"
                   keyTimes="0;0.44;0.452;0.464;0.476;0.488;0.5;0.86;0.87;0.882;0.894;1"
                   dur="16s" begin="5.9s" repeatCount="indefinite"/>
        </text>

        <text x="450" y="128" font-size="50" font-weight="700" fill="#F5F5F5" letter-spacing="0.5">
          Gabriel Bensamoun
        </text>

        <text x="450" y="160" font-size="14" font-weight="500" fill="#F5F5F5" fill-opacity="0.72" letter-spacing="2">
          FULL-STACK DEVELOPER · AI INTEGRATIONS · NETWORKS &amp; INFRASTRUCTURE
        </text>

        <rect x="410" y="178" width="80" height="2" rx="1" fill="#E08A63" fill-opacity="0.8"/>

        <text x="450" y="212" font-size="18" font-weight="600" fill="#FFCDB4">
          React · Next.js · TypeScript · Node.js · Python
        </text>
      </g>

      <rect width="900" height="300" fill="url(#scan)"/>

      <rect x="0" y="-60" width="900" height="60" fill="url(#beam)">
        <animate attributeName="y" values="-60;300" dur="5s" begin="5.9s" repeatCount="indefinite"/>
      </rect>
    </g>

  </g>
</svg>
